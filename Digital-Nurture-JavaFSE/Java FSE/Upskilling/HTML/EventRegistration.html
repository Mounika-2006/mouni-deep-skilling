<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container {
            width: 500px;
            margin: 30px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: #0066cc;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            background-color: #0066cc;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004c99;
        }

        output {
            display: block;
            margin-top: 15px;
            color: green;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Event Registration Form</h2>

        <form onsubmit="showMessage(event)">

            <label for="name">Name</label>
            <input type="text"
                   id="name"
                   placeholder="Enter your full name"
                   required
                   autofocus>

            <label for="email">Email</label>
            <input type="email"
                   id="email"
                   placeholder="Enter your email address"
                   required>

            <label for="date">Event Date</label>
            <input type="date"
                   id="date"
                   required>

            <label for="eventType">Event Type</label>
            <select id="eventType" required>
                <option value="">-- Select Event --</option>
                <option>Tree Plantation Drive</option>
                <option>Blood Donation Camp</option>
                <option>Health Awareness Program</option>
                <option>Cleanliness Drive</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message"
                      rows="4"
                      placeholder="Enter any additional information"></textarea>

            <button type="submit">Register</button>

            <output id="result"></output>

        </form>
    </div>

    <script>
        function showMessage(event) {
            event.preventDefault();

            let name = document.getElementById("name").value;

            document.getElementById("result").value =
                "Registration Successful! Thank you, " + name + ".";
        }
    </script>

</body>
</html>
