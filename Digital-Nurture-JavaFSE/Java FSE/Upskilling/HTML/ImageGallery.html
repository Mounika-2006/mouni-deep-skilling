<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events Gallery</title>

    <style>
        .event-image {
            width: 200px;
            height: 150px;
            border: 3px solid #333;
            border-radius: 8px;
            padding: 3px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 15px;
            text-align: center;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <table>
        <caption>Community Events Photo Gallery</caption>

        <!-- Row 1 -->
        <tr>
            <td>
                <img src="images/tree-plantation.jpg"
                     alt="Tree Plantation Drive"
                     title="Tree Plantation Drive"
                     class="event-image">
                <br>
                <strong>Tree Plantation Drive</strong>
            </td>

            <td>
                <img src="images/blood-donation.jpg"
                     alt="Blood Donation Camp"
                     title="Blood Donation Camp"
                     class="event-image">
                <br>
                <strong>Blood Donation Camp</strong>
            </td>

            <td>
                <img src="images/cleanliness-drive.jpg"
                     alt="Cleanliness Drive"
                     title="Cleanliness Drive"
                     class="event-image">
                <br>
                <strong>Cleanliness Drive</strong>
            </td>
        </tr>

        <!-- Row 2 -->
        <tr>
            <td>
                <img src="images/health-camp.jpg"
                     alt="Health Awareness Camp"
                     title="Health Awareness Camp"
                     class="event-image">
                <br>
                <strong>Health Awareness Camp</strong>
            </td>

            <td>
                <img src="images/sports-event.jpg"
                     alt="Community Sports Event"
                     title="Community Sports Event"
                     class="event-image">
                <br>
                <strong>Community Sports Event</strong>
            </td>

            <td>
                <img src="images/cultural-program.jpg"
                     alt="Cultural Program"
                     title="Cultural Program"
                     class="event-image">
                <br>
                <strong>Cultural Program</strong>
            </td>
        </tr>

    </table>

</body>
</html>
