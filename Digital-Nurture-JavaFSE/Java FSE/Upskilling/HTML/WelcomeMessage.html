<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        /* Styling for the welcome banner using ID */
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }

        /* Styling for highlighted elements using Class */
        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 3px;
        }
    </style>
</head>
<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        <h1>Welcome, User!</h1>
        <p>We're glad to have you on our portal.</p>
    </div>

    <br>

    <p>
        Today's 
        <span style="color: red; font-weight: bold;">
            Special Offer: Get 50% OFF on Premium Membership!
        </span>
    </p>

    <p class="highlight">
        Hurry! This offer is valid only for today.
    </p>

    <h3 class="highlight">
        Exclusive Benefits Available for Registered Users
    </h3>

</body>
</html>
