<!DOCTYPE html>
<html>
<head>
    <title>CSS Demo</title>

    <!-- Internal CSS -->
    <style>
        body{
            background-color: lightblue;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color:red;">Welcome to CSS</h1>

    <h2 class="header">External CSS Example</h2>

    <p class="content">Learning Inline, Internal and External CSS.</p>

</body>
</html>
